<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Transzfer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef1f6;
    --panel:#ffffff;
    --panel-2:#f4f6fa;
    --line:#d7dee6;
    --line-soft:#e3e8ef;
    --navy:#1f3a63;
    --navy-2:#274a7a;
    --navy-dark:#16294a;
    --navy-tint:#eaf0fa;
    --green:#2f9e44;
    --green-2:#278a3b;
    --green-tint:#eaf7ec;
    --red:#d64545;
    --red-tint:#fbebeb;
    --text:#1c2430;
    --muted:#6b7686;
    --muted-2:#97a0ac;
    --shadow-1:0 1px 2px rgba(20,30,50,.06), 0 3px 10px rgba(20,30,50,.06);
    --shadow-2:0 6px 20px rgba(20,30,50,.14);
    --radius:12px;
    --radius-sm:8px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;color:var(--text);background:var(--bg);
    font-family:-apple-system,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-user-select:none; user-select:none;
    height:100%;}
  .mono{font-family:ui-monospace,"IBM Plex Mono",Consolas,monospace;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 0 100px;}

  /* Top navy header bar (full-bleed) */
  .topbar{background:linear-gradient(180deg, var(--navy-2) 0%, var(--navy) 100%);
    padding:18px 16px 16px;box-shadow:0 2px 10px rgba(22,41,74,.25);}
  .topbar-inner{display:flex;align-items:center;gap:10px;justify-content:center;}
  .topbar .logo{flex:0 0 auto;width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.14);
    display:flex;align-items:center;justify-content:center;}
  .topbar .logo svg{width:17px;height:17px;display:block;}
  .topbar .title{font-weight:700;font-size:18px;letter-spacing:1.2px;text-transform:uppercase;color:#fff;text-align:center;}
  .topbar .sub{font-size:11px;color:rgba(255,255,255,.65);text-align:center;margin-top:4px;letter-spacing:.2px;}

  /* Session info: date + operator name, sitting on the navy bar */
  .sessionbar{display:flex;gap:8px;margin-top:14px;}
  .sfield{flex:1;background:#fff;border:1px solid rgba(255,255,255,.5);border-radius:var(--radius-sm);
    padding:7px 12px;box-shadow:0 1px 3px rgba(0,0,0,.12);}
  .sfield .slabel{display:block;font-size:9px;font-weight:700;letter-spacing:.6px;
    text-transform:uppercase;color:var(--muted-2);margin-bottom:1px;}
  .sfield .sdate{font-size:13.5px;font-weight:600;color:var(--text);}
  .sfield-name{flex:1.3;}
  .sessionbar .sfield-name input{width:100%;background:transparent;border:none;padding:0;margin:0;
    font-size:13.5px;font-weight:600;color:var(--text);font-family:inherit;
    letter-spacing:.1px;text-transform:none;box-shadow:none;}
  .sessionbar .sfield-name input:focus{outline:none;box-shadow:none;border-color:transparent;}

  .body-content{padding:16px 12px 0;}

  /* Step tracker */
  .tracker{display:flex;gap:6px;margin:0 0 8px;}
  .tracker .seg{flex:1;height:5px;border-radius:3px;background:var(--line);position:relative;overflow:hidden;
    transition:background .35s ease;}
  .tracker .seg.done{background:var(--green);}
  .tracker .seg.active{background:var(--navy);}
  .tracker .seg.active::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.45);
    animation:pulse 1.3s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.15}50%{opacity:.6}}
  .steplabels{display:flex;gap:6px;margin-top:6px;margin-bottom:14px;}
  .steplabels span{flex:1;text-align:center;font-size:9.5px;font-weight:700;
    letter-spacing:.5px;text-transform:uppercase;color:var(--muted-2);transition:color .3s ease;}
  .steplabels span.on{color:var(--navy);}

  /* Card — white with a navy header strip, like a numbered form row */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:12px;box-shadow:var(--shadow-1);
    animation:cardIn .25s ease;}
  @keyframes cardIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
  .steptitle{margin:-16px -16px 14px;padding:11px 16px;background:var(--navy);color:#fff;
    font-size:12.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;
    display:flex;align-items:center;border-top-left-radius:var(--radius);border-top-right-radius:var(--radius);}
  .stepnum{display:inline-flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.75);font-weight:700;font-size:12.5px;margin-right:6px;}
  .stepnum::before{content:'#';}

  label.flabel{display:block;font-size:10px;font-weight:700;letter-spacing:.6px;
    text-transform:uppercase;color:var(--muted);margin-bottom:6px;}

  input[type=text]{
    width:100%;padding:13px 12px;font-size:16px;font-weight:500;
    background:#fff;border:1.5px solid var(--line);border-radius:var(--radius-sm);color:var(--text);
    font-family:inherit;letter-spacing:.2px;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input[type=text]:focus{outline:none;border-color:var(--navy);
    box-shadow:0 0 0 3px rgba(31,58,99,.12);}
  input[type=text].bad{border-color:var(--red);color:#b23b3b;background:var(--red-tint);}
  input[type=text].good{border-color:var(--green);background:var(--green-tint);}

  .field-wrap input[type=text]{padding-right:46px;}
  .camscan-btn{position:absolute;top:0;right:0;height:100%;width:44px;
    display:flex;align-items:center;justify-content:center;background:none;border:none;
    color:var(--muted);padding:0;}
  .camscan-btn svg{width:21px;height:21px;}
  .camscan-btn:active{color:var(--navy);}

  .scan-modal{position:fixed;inset:0;background:rgba(20,25,35,.75);z-index:100;
    display:none;align-items:center;justify-content:center;padding:16px;}
  .scan-modal.show{display:flex;}
  .scan-box{background:#fff;border-radius:var(--radius);max-width:420px;width:100%;
    overflow:hidden;box-shadow:var(--shadow-2);}
  .scan-header{display:flex;align-items:center;justify-content:space-between;
    background:var(--navy);color:#fff;padding:12px 14px;font-weight:700;font-size:13px;
    letter-spacing:.4px;text-transform:uppercase;}
  .scan-close{background:none;border:none;color:#fff;font-size:16px;padding:2px 6px;}
  #qr-reader{width:100%;min-height:220px;background:#000;}
  .scan-hint{padding:12px 14px;font-size:12.5px;color:var(--muted);text-align:center;}
  .scan-hint.error{color:var(--red);}

  .lookup{margin-top:11px;padding:11px 13px;border-radius:var(--radius-sm);font-size:13px;line-height:1.45;display:none;}
  .lookup.show{display:block;animation:cardIn .2s ease;}
  .lookup.ok{background:var(--green-tint);border:1px solid #b7e2bf;color:#1e6b2c;}
  .lookup.warn{background:var(--red-tint);border:1px solid #f0bcbc;color:#a53434;}
  .lookup .label{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px;}

  /* qty input (native numeric keyboard) */
  .qtyinput{width:100%;margin-top:0;background:#fff;border:1.5px solid var(--navy);border-radius:var(--radius-sm);
    padding:14px;text-align:right;font-size:32px;font-weight:700;letter-spacing:.5px;color:var(--navy);
    font-family:inherit;transition:box-shadow .15s ease;}
  .qtyinput:focus{outline:none;box-shadow:0 0 0 3px rgba(31,58,99,.15);}
  .qtyinput::placeholder{color:#c3cad4;}

  .btnrow{display:flex;gap:9px;margin-top:14px;}
  button.primary{flex:1;padding:14px;background:var(--navy);
    color:#fff;border:none;border-radius:var(--radius-sm);
    font-weight:700;font-size:14px;letter-spacing:.4px;text-transform:uppercase;font-family:inherit;
    transition:transform .08s ease, opacity .15s ease;}
  button.primary:active{transform:scale(.98);}
  button.primary:disabled{background:#c3cad4;color:#8f97a3;}
  button.secondary{padding:14px 18px;background:#fff;color:var(--muted);border:1.5px solid var(--line);
    border-radius:var(--radius-sm);font-weight:700;font-size:12.5px;text-transform:uppercase;font-family:inherit;
    transition:background .15s ease, transform .08s ease;}
  button.secondary:active{transform:scale(.97);background:var(--panel-2);}

  /* summary row shown once from/item/to captured */
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
  .chip{background:#fff;border:1px solid var(--line);border-radius:7px;padding:6px 11px;font-size:11px;color:var(--muted);
    box-shadow:var(--shadow-1);}
  .chip b{color:var(--navy);font-size:12px;letter-spacing:.2px;}

  /* log */
  .logheader{display:flex;justify-content:space-between;align-items:baseline;margin:6px 2px 10px;}
  .logheader .lt{font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
  .logheader .lc{font-size:12px;color:var(--navy);font-weight:700;}
  .logitem{background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 13px;margin-bottom:9px;
    display:flex;justify-content:space-between;align-items:center;gap:8px;box-shadow:var(--shadow-1);}
  .logitem .meta{font-size:11px;color:var(--muted);}
  .logitem .route{font-size:13.5px;font-weight:700;color:var(--text);letter-spacing:.1px;}
  .logitem .route .arrow{color:var(--navy);margin:0 5px;}
  .logitem .desc{font-size:11px;color:var(--muted-2);margin-top:3px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .logitem .qty{font-weight:700;font-size:18px;color:var(--navy);white-space:nowrap;}
  .logitem .del{background:none;border:none;color:var(--muted-2);font-size:17px;padding:4px 8px;border-radius:6px;
    transition:color .15s ease, background .15s ease;}
  .logitem .del:active{color:var(--red);background:var(--red-tint);}
  .empty{text-align:center;color:var(--muted-2);font-size:12px;padding:34px 10px;}

  /* sticky bottom bar */
  .bottombar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);box-shadow:0 -4px 16px rgba(20,30,50,.08);
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;max-width:520px;margin:0 auto;}
  .bottombar .count{flex:0 0 auto;display:flex;flex-direction:column;justify-content:center;padding:0 8px;}
  .bottombar .count b{font-size:17px;color:var(--navy);}
  .bottombar .count span{font-size:9px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.4px;}
  .bottombar button.export{flex:1;background:var(--navy);color:#fff;border:none;border-radius:var(--radius-sm);
    font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.3px;font-family:inherit;
    transition:transform .08s ease;}
  .bottombar button.export:active{transform:scale(.97);}
  .bottombar button.export:disabled{background:#cdd3db;color:#98a0ab;}
  .bottombar button.export.savebtn{background:var(--green);}
  .bottombar button.export.savebtn:disabled{background:#cdd3db;color:#98a0ab;}
  .bottombar button.clearall{background:#fff;border:1.5px solid var(--line);color:var(--muted);border-radius:var(--radius-sm);
    font-weight:700;font-size:11.5px;text-transform:uppercase;padding:0 12px;font-family:inherit;
    transition:transform .08s ease, background .15s ease;}
  .bottombar button.clearall:active{transform:scale(.97);background:var(--red-tint);color:var(--red);}

  .toast{position:fixed;top:16px;left:50%;transform:translate(-50%,-10px);background:var(--navy);color:#fff;
    padding:11px 20px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;
    letter-spacing:.3px;text-transform:uppercase;opacity:0;box-shadow:var(--shadow-2);
    transition:opacity .25s ease, transform .25s ease;z-index:50;pointer-events:none;}
  .toast.show{opacity:1;transform:translate(-50%,0);}
  .field-wrap{position:relative;}
  .suggest-list{position:absolute;left:0;right:0;top:100%;margin-top:5px;background:#fff;
    border:1px solid var(--line);border-radius:var(--radius-sm);max-height:220px;overflow-y:auto;z-index:20;
    box-shadow:var(--shadow-2);display:none;}
  .suggest-list.show{display:block;animation:cardIn .15s ease;}
  .suggest-item{padding:11px 13px;border-bottom:1px solid var(--line-soft);font-size:13px;}
  .suggest-item:last-child{border-bottom:none;}
  .suggest-item b{color:var(--navy);letter-spacing:.2px;}
  .suggest-item .sdesc{color:var(--muted);font-size:11px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .suggest-item:active{background:var(--navy-tint);}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="5" width="2" height="14" fill="#fff"/>
        <rect x="7" y="5" width="1" height="14" fill="#fff"/>
        <rect x="10" y="5" width="3" height="14" fill="#fff"/>
        <rect x="15" y="5" width="1" height="14" fill="#fff"/>
        <rect x="18" y="5" width="2" height="14" fill="#fff"/>
      </svg>
    </div>
  </div>
  <div class="title">Transzfer</div>
  <div class="sub">Scan: from → item (Item No.) → to → quantity</div>
  <div class="sessionbar">
    <div class="sfield">
      <span class="slabel">Date</span>
      <span class="sdate" id="today-date"></span>
    </div>
    <div class="sfield sfield-name">
      <span class="slabel">Operator</span>
      <input type="text" id="operator-name" placeholder="Your name..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>
</div>

<div id="app">
<div class="body-content">

  <div class="tracker" id="tracker">
    <div class="seg" data-s="1"></div>
    <div class="seg" data-s="2"></div>
    <div class="seg" data-s="3"></div>
    <div class="seg" data-s="4"></div>
  </div>
  <div class="steplabels" id="steplabels">
    <span data-s="1">From</span>
    <span data-s="2">Item</span>
    <span data-s="3">To</span>
    <span data-s="4">Qty</span>
  </div>

  <div class="chips" id="chips" style="display:none;"></div>

  <!-- STEP 1: FROM -->
  <div class="card" id="card-1">
    <div class="steptitle"><span class="stepnum">1</span>From Location</div>
    <div class="field-wrap">
      <input type="text" id="in-from" placeholder="Scan or type..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button type="button" class="camscan-btn" id="btn-scan-from" aria-label="Scan with camera">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 8V6a2 2 0 0 1 2-2h2M20 8V6a2 2 0 0 0-2-2h-2M4 16v2a2 2 0 0 0 2 2h2M20 16v2a2 2 0 0 1-2 2h-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <div class="suggest-list" id="sg-from"></div>
    </div>
    <div class="btnrow">
      <button class="primary" id="btn-from-next">Next</button>
    </div>
  </div>

  <!-- STEP 2: ITEM -->
  <div class="card" id="card-2" style="display:none;">
    <div class="steptitle"><span class="stepnum">2</span>Item (code)</div>
    <div class="field-wrap">
      <input type="text" id="in-item" placeholder="Scan or type..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button type="button" class="camscan-btn" id="btn-scan-item" aria-label="Scan with camera">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 8V6a2 2 0 0 1 2-2h2M20 8V6a2 2 0 0 0-2-2h-2M4 16v2a2 2 0 0 0 2 2h2M20 16v2a2 2 0 0 1-2 2h-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <div class="suggest-list" id="sg-item"></div>
    </div>
    <div class="lookup" id="lookup-box">
      <div class="label" id="lookup-label">Description</div>
      <div id="lookup-text"></div>
    </div>
    <div class="btnrow" id="item-continue-row" style="display:none;">
      <button class="secondary" onclick="clearItemField()">Retry</button>
      <button class="primary" onclick="confirmUnknownItem()">Continue with unknown item</button>
    </div>
  </div>

  <!-- STEP 3: TO -->
  <div class="card" id="card-3" style="display:none;">
    <div class="steptitle"><span class="stepnum">3</span>To Location</div>
    <div class="field-wrap">
      <input type="text" id="in-to" placeholder="Scan or type..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button type="button" class="camscan-btn" id="btn-scan-to" aria-label="Scan with camera">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 8V6a2 2 0 0 1 2-2h2M20 8V6a2 2 0 0 0-2-2h-2M4 16v2a2 2 0 0 0 2 2h2M20 16v2a2 2 0 0 1-2 2h-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <div class="suggest-list" id="sg-to"></div>
    </div>
    <div class="btnrow">
      <button class="primary" id="btn-to-next">Next</button>
    </div>
  </div>

  <!-- STEP 4: QTY -->
  <div class="card" id="card-4" style="display:none;">
    <div class="steptitle"><span class="stepnum">4</span>Quantity</div>
    <input type="text" inputmode="numeric" pattern="[0-9]*" id="qty-input" class="qtyinput"
      placeholder="0" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="btnrow">
      <button class="secondary" onclick="resetFlow()">Cancel</button>
      <button class="primary" id="save-btn" onclick="saveTransfer()" disabled>Save</button>
    </div>
  </div>

  <div class="logheader">
    <div class="lt">Recorded transfers</div>
    <div class="lc" id="log-count">0 items</div>
  </div>
  <div id="log-list"></div>

</div>
</div>

<div class="bottombar">
  <div class="count">
    <b id="bar-count">0</b>
    <span>items</span>
  </div>
  <button class="clearall" onclick="clearAll()">Clear</button>
  <button class="export" id="export-btn" onclick="exportExcel()" disabled>Share</button>
  <button class="export savebtn" id="save-file-btn" onclick="exportExcelDownload()" disabled title="Save to device">Save</button>
</div>

<div class="toast" id="toast"></div>

<div class="scan-modal" id="scan-modal">
  <div class="scan-box">
    <div class="scan-header">
      <span id="scan-title">Scan with camera</span>
      <button type="button" class="scan-close" id="scan-close" aria-label="Close">✕</button>
    </div>
    <div id="qr-reader"></div>
    <div class="scan-hint" id="scan-hint">Point the camera at the barcode or QR code</div>
  </div>
</div>

<script>
  // ---------- Item master ----------
  const RAW_ITEMS = JSON.parse(document.getElementById('items-data').textContent);
  const ITEMS = {}; // normalized upper key -> {id, desc, sales, sap}
  for (const k in RAW_ITEMS){
    const r = RAW_ITEMS[k];
    ITEMS[k.trim().toUpperCase()] = {id:k, desc:r.desc||'', sales:r.sales||'', sap:r.sap||''};
  }

  // ---------- State ----------
  let step = 1;
  let current = {from:'', itemId:'', itemDesc:'', itemSales:'', sapCode:'', itemKnown:true, to:'', qty:0};
  let transfers = [];

  const STORAGE_KEY = 'zebra_transfer_log_sap_v1';
  const LOC_KEY = 'zebra_loc_history_sap_v1';
  const OPERATOR_KEY = 'zebra_operator_name_sap_v1';
  let locHistory = [];
  let operatorName = '';

  function loadOperatorName(){
    try{ operatorName = localStorage.getItem(OPERATOR_KEY) || ''; }catch(e){ operatorName = ''; }
  }
  function saveOperatorName(v){
    operatorName = v;
    try{ localStorage.setItem(OPERATOR_KEY, v); }catch(e){}
  }

  function loadLocHistory(){
    try{
      const raw = localStorage.getItem(LOC_KEY);
      if (raw) locHistory = JSON.parse(raw);
    }catch(e){ locHistory = []; }
  }
  function rememberLocation(v){
    if (!v) return;
    locHistory = locHistory.filter(x => x.toUpperCase() !== v.toUpperCase());
    locHistory.unshift(v);
    if (locHistory.length > 200) locHistory = locHistory.slice(0,200);
    try{ localStorage.setItem(LOC_KEY, JSON.stringify(locHistory)); }catch(e){}
  }

  function loadStorage(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) transfers = JSON.parse(raw);
    }catch(e){ transfers = []; }
  }
  function saveStorage(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(transfers)); }catch(e){}
  }

  const el = id => document.getElementById(id);

  function updateTracker(){
    for (let i=1;i<=4;i++){
      const seg = document.querySelector(`.seg[data-s="${i}"]`);
      const lbl = document.querySelector(`.steplabels span[data-s="${i}"]`);
      seg.classList.remove('done','active');
      lbl.classList.remove('on');
      if (i < step) seg.classList.add('done');
      else if (i === step){ seg.classList.add('active'); lbl.classList.add('on'); }
    }
  }

  function updateChips(){
    const chips = el('chips');
    let html = '';
    if (current.from) html += `<div class="chip">FROM <b>${escapeHtml(current.from)}</b></div>`;
    if (current.itemId) html += `<div class="chip">ITEM <b>${escapeHtml(current.itemId)}</b></div>`;
    if (current.sapCode) html += `<div class="chip">SAP CODE <b>${escapeHtml(current.sapCode)}</b></div>`;
    if (current.to) html += `<div class="chip">TO <b>${escapeHtml(current.to)}</b></div>`;
    chips.innerHTML = html;
    chips.style.display = html ? 'flex' : 'none';
  }

  function showStep(n){
    step = n;
    for (let i=1;i<=4;i++){
      el('card-'+i).style.display = (i===n) ? '' : 'none';
    }
    updateTracker();
    updateChips();
    if (n===1) focusSoon('in-from');
    if (n===2) focusSoon('in-item');
    if (n===3) focusSoon('in-to');
    if (n===4) focusSoon('qty-input');
  }

  function focusSoon(id){
    setTimeout(()=>{ const i = el(id); if(i){ i.value=''; i.focus(); } }, 50);
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- Generic scanner input handling ----------
  // Zebra scanners usually send Enter (or Tab) after a scan, but some
  // DataWedge profiles are configured without a suffix key. To be robust
  // either way: (1) Enter/Tab still triggers instantly, (2) as a fallback,
  // if the field goes quiet for a short moment after fast input, we treat
  // that as "scan finished" and trigger automatically too.
  function wireScanInput(id, minLen, onComplete, autoDebounce){
    if (autoDebounce === undefined) autoDebounce = true;
    const inp = el(id);
    let timer = null;
    function trigger(){
      if (timer){ clearTimeout(timer); timer = null; }
      const v = inp.value.trim();
      if (!v) return;
      onComplete(v);
    }
    inp.addEventListener('keydown', e=>{
      if (e.key==='Enter' || e.key==='Tab' || e.keyCode===13 || e.keyCode===9){
        e.preventDefault();
        trigger();
      }
    });
    if (autoDebounce){
      inp.addEventListener('input', ()=>{
        if (timer) clearTimeout(timer);
        const v = inp.value.trim();
        if (v.length < minLen) return;
        timer = setTimeout(trigger, 550);
      });
    }
    return trigger;
  }

  // ---------- Suggestion dropdowns (manual typing helper) ----------
  function wireSuggest(inputId, listId, minLen, getMatches){
    const inp = el(inputId);
    const list = el(listId);
    function hide(){ list.classList.remove('show'); list.innerHTML=''; }
    inp.addEventListener('input', ()=>{
      const v = inp.value.trim();
      if (v.length < minLen){ hide(); return; }
      const matches = getMatches(v);
      if (!matches.length){ hide(); return; }
      list.innerHTML = matches.map(m =>
        `<div class="suggest-item" data-val="${escapeHtml(m.id)}"><b>${escapeHtml(m.id)}</b>${m.desc ? `<div class="sdesc">${escapeHtml(m.desc)}</div>` : ''}</div>`
      ).join('');
      list.classList.add('show');
    });
    list.addEventListener('mousedown', e=>{
      const item = e.target.closest('.suggest-item');
      if (!item) return;
      e.preventDefault();
      inp.value = item.getAttribute('data-val');
      hide();
      inp.focus();
      inp.dispatchEvent(new KeyboardEvent('keydown', {key:'Enter', keyCode:13, bubbles:true}));
    });
    inp.addEventListener('blur', ()=> setTimeout(hide, 150));
  }

  function itemMatches(v){
    const uv = v.toUpperCase();
    const starts = []; const contains = [];
    for (const k in ITEMS){
      if (starts.length>=8 && contains.length>=8) break;
      if (k.indexOf(uv)===0){ if (starts.length<8) starts.push(ITEMS[k]); }
      else if (k.indexOf(uv)!==-1){ if (contains.length<8) contains.push(ITEMS[k]); }
    }
    return starts.concat(contains).slice(0,8).map(it => ({id:it.id, desc:it.desc || it.sales}));
  }
  function locMatches(v){
    const uv = v.toUpperCase();
    return locHistory.filter(l => l.toUpperCase().indexOf(uv)!==-1).slice(0,6).map(l => ({id:l, desc:''}));
  }

  // ---------- Step 1: FROM ----------
  const triggerFrom = wireScanInput('in-from', 4, v=>{
    current.from = v;
    rememberLocation(v);
    showStep(2);
  }, false);
  wireSuggest('in-from', 'sg-from', 1, locMatches);
  el('btn-from-next').addEventListener('click', triggerFrom);

  // ---------- Step 2: ITEM ----------
  wireScanInput('in-item', 4, v=>{
    lookupItem(v);
  });
  wireSuggest('in-item', 'sg-item', 2, itemMatches);

  function lookupItem(v){
    const key = v.toUpperCase();
    const found = ITEMS[key];
    const box = el('lookup-box');
    const row = el('item-continue-row');
    box.classList.add('show');
    if (found){
      current.itemId = found.id;
      current.itemDesc = found.desc;
      current.itemSales = found.sales;
      current.sapCode = found.sap;
      current.itemKnown = true;
      box.className = 'lookup show ok';
      el('lookup-label').textContent = 'Description' + (found.sap ? ' · SAP: ' + found.sap : '');
      const lines = [found.desc, found.sales].filter(Boolean);
      el('lookup-text').innerHTML = lines.length
        ? lines.map(escapeHtml).join('<br>')
        : '(nincs leírás)';
      el('in-item').classList.remove('bad'); el('in-item').classList.add('good');
      row.style.display = 'none';
      setTimeout(()=> showStep(3), 450);
    } else {
      current.itemId = v;
      current.itemDesc = '';
      current.itemSales = '';
      current.sapCode = '';
      current.itemKnown = false;
      box.className = 'lookup show warn';
      el('lookup-label').textContent = 'Warning';
      el('lookup-text').textContent = 'Unknown item code in master list: ' + v;
      el('in-item').classList.remove('good'); el('in-item').classList.add('bad');
      row.style.display = 'flex';
    }
  }

  function clearItemField(){
    el('lookup-box').classList.remove('show');
    el('item-continue-row').style.display = 'none';
    el('in-item').classList.remove('bad','good');
    focusSoon('in-item');
  }

  function confirmUnknownItem(){
    showStep(3);
  }

  // ---------- Step 3: TO ----------
  const triggerTo = wireScanInput('in-to', 4, v=>{
    current.to = v;
    rememberLocation(v);
    current.qty = 0;
    el('qty-input').value = '';
    el('save-btn').disabled = true;
    showStep(4);
  }, false);
  wireSuggest('in-to', 'sg-to', 1, locMatches);
  el('btn-to-next').addEventListener('click', triggerTo);

  // ---------- Step 4: QTY (native numeric keyboard) ----------
  el('qty-input').addEventListener('input', e=>{
    // Digits only, cap at 6 characters
    let s = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
    e.target.value = s;
    current.qty = parseInt(s, 10) || 0;
    el('save-btn').disabled = current.qty <= 0;
  });
  el('qty-input').addEventListener('keydown', e=>{
    if (e.key === 'Enter'){
      e.preventDefault();
      if (current.qty > 0) saveTransfer();
    }
  });

  function saveTransfer(){
    if (current.qty<=0) return;
    transfers.unshift({
      from: current.from,
      itemId: current.itemId,
      itemDesc: current.itemDesc,
      itemSales: current.itemSales,
      sapCode: current.sapCode,
      itemKnown: current.itemKnown,
      to: current.to,
      qty: current.qty,
      operator: operatorName,
      ts: new Date().toLocaleString('en-GB')
    });
    saveStorage();
    renderLog();
    showToast('Saved');
    resetFlow();
  }

  function resetFlow(){
    current = {from:'', itemId:'', itemDesc:'', itemSales:'', sapCode:'', itemKnown:true, to:'', qty:0};
    el('lookup-box').classList.remove('show');
    el('item-continue-row').style.display = 'none';
    el('in-item').classList.remove('bad','good');
    showStep(1);
  }

  // ---------- Log ----------
  function renderLog(){
    const list = el('log-list');
    el('log-count').textContent = transfers.length + ' tétel';
    el('bar-count').textContent = transfers.length;
    el('export-btn').disabled = transfers.length===0;
    el('save-file-btn').disabled = transfers.length===0;
    if (transfers.length===0){
      list.innerHTML = '<div class="empty">No transfers recorded yet.<br>Start by scanning the FROM location.</div>';
      return;
    }
    list.innerHTML = transfers.map((t,idx)=>{
      const warn = t.itemKnown ? '' : ' ⚠';
      return `<div class="logitem">
        <div>
          <div class="route">${escapeHtml(t.from)}<span class="arrow">→</span>${escapeHtml(t.to)}</div>
          <div class="meta">${escapeHtml(t.itemId)}${t.sapCode ? ' · SAP: '+escapeHtml(t.sapCode) : ''}${warn} · ${escapeHtml(t.ts)}${t.operator ? ' · '+escapeHtml(t.operator) : ''}</div>
          ${t.itemDesc ? `<div class="desc">${escapeHtml(t.itemDesc)}</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:4px;">
          <div class="qty">${t.qty}</div>
          <button class="del" onclick="deleteTransfer(${idx})">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  function deleteTransfer(idx){
    transfers.splice(idx,1);
    saveStorage();
    renderLog();
  }

  function clearAll(){
    if (transfers.length===0) return;
    if (confirm('Are you sure you want to clear all recorded transfers?')){
      transfers = [];
      saveStorage();
      renderLog();
    }
  }

  function showToast(msg){
    const t = el('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=> t.classList.remove('show'), 1200);
  }

  // ---------- Export ----------
  function csvEscape(v){
    v = String(v);
    if (/[",\n;]/.test(v)) v = '"' + v.replace(/"/g,'""') + '"';
    return v;
  }

  function buildTransferExport(){
    const rows = transfers.slice().reverse(); // chronological order in export
    const headers = ['#','From','Item Code','Description','SalesDesc','SAP Code','To','Quantity','Operator'];
    let html = '<html><head><meta charset="UTF-8"></head><body><table border="1">';
    html += '<tr>' + headers.map(h=>`<th>${h}</th>`).join('') + '</tr>';
    let csv = headers.map(csvEscape).join(',') + '\r\n';
    let tsv = headers.join('\t') + '\n';
    rows.forEach((t,i)=>{
      const cells = [i+1, t.from, t.itemId, t.itemDesc||'', t.itemSales||'', t.sapCode||'', t.to, t.qty, t.operator||''];
      html += '<tr>' + cells.map(c=>`<td>${escapeHtml(c)}</td>`).join('') + '</tr>';
      csv += cells.map(csvEscape).join(',') + '\r\n';
      tsv += cells.map(c=>String(c).replace(/\t|\n/g,' ')).join('\t') + '\n';
    });
    html += '</table></body></html>';
    const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    const filename = `transzfer_${stamp}.csv`;
    // Real CSV — Excel/Numbers/Sheets open it natively with no
    // "file format doesn't match extension" warning (unlike the old
    // HTML-table-disguised-as-.xls trick).
    const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
    return {blob, filename, html, tsv};
  }

  function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 4000);
  }

  function exportExcel(){
    if (transfers.length===0) return;
    const {blob, filename, html, tsv} = buildTransferExport();

    // 1) Native share sheet (works even when direct downloads are blocked,
    //    e.g. on some Android WebViews when the page is opened from a local file)
    try{
      const file = new File([blob], filename, {type:'text/csv;charset=utf-8;'});
      if (navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({files:[file], title:filename}).catch(()=>{});
        return;
      }
    }catch(e){ /* File/share not supported, fall through */ }

    // 2) Standard anchor download
    try{
      downloadBlob(blob, filename);
      showToast('Export started');
      return;
    }catch(e){ /* fall through to last resort */ }

    // 3) Last resort: open the table in a new tab and copy TSV to clipboard,
    //    so the data is never lost even if downloads are blocked entirely.
    try{
      const w = window.open('', '_blank');
      if (w){ w.document.write(html); w.document.close(); }
    }catch(e){}
    try{
      navigator.clipboard && navigator.clipboard.writeText(tsv);
    }catch(e){}
    alert('The download did not start on this device. The data has been opened in a new tab and copied to the clipboard (paste into Excel/Sheets).');
  }

  function exportExcelDownload(){
    // Always the direct-download / "Save to Files" style path, skipping the
    // share sheet entirely — for people who want the file saved locally
    // rather than shared to an app.
    if (transfers.length===0) return;
    const {blob, filename, html, tsv} = buildTransferExport();
    try{
      downloadBlob(blob, filename);
      showToast('Saved to downloads');
    }catch(e){
      try{
        const w = window.open('', '_blank');
        if (w){ w.document.write(html); w.document.close(); }
      }catch(e2){}
      try{ navigator.clipboard && navigator.clipboard.writeText(tsv); }catch(e2){}
      alert('The save did not start on this device. The data has been opened in a new tab and copied to the clipboard.');
    }
  }

  // ---------- Camera scanning (phone/tablet cameras, QR + common barcodes) ----------
  // Zebra hardware scanners keep working exactly as before (keyboard-wedge typing
  // into the fields). This adds an on-screen camera option for devices without a
  // physical scanner, e.g. regular phones. The library is only fetched when the
  // camera button is actually tapped, so the app still works fully offline otherwise.
  let scanLibState = 'idle'; // idle | loading | ready | failed
  let scanLibCallbacks = [];
  let html5QrcodeInstance = null;
  let scanTargetId = null;

  function loadScanLib(cb){
    if (scanLibState === 'ready') { cb(); return; }
    if (scanLibState === 'failed') { cb(new Error('lib-failed')); return; }
    scanLibCallbacks.push(cb);
    if (scanLibState === 'loading') return;
    scanLibState = 'loading';
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js';
    s.onload = () => {
      scanLibState = 'ready';
      scanLibCallbacks.forEach(f => f());
      scanLibCallbacks = [];
    };
    s.onerror = () => {
      scanLibState = 'failed';
      scanLibCallbacks.forEach(f => f(new Error('lib-failed')));
      scanLibCallbacks = [];
    };
    document.head.appendChild(s);
  }

  function setScanHint(msg, isError){
    const h = el('scan-hint');
    h.textContent = msg;
    h.className = 'scan-hint' + (isError ? ' error' : '');
  }

  function openScanner(targetId, title){
    scanTargetId = targetId;
    el('scan-title').textContent = title;
    setScanHint('Loading camera…', false);
    el('scan-modal').classList.add('show');
    loadScanLib(err=>{
      if (err){
        setScanHint('Could not load the scanner (no internet connection?). Type the code manually instead.', true);
        return;
      }
      startCamera();
    });
  }

  function startCamera(){
    try{
      const formats = [
        Html5QrcodeSupportedFormats.QR_CODE,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.ITF,
        Html5QrcodeSupportedFormats.CODABAR
      ];
      html5QrcodeInstance = new Html5Qrcode('qr-reader', {formatsToSupport: formats, verbose:false});
      html5QrcodeInstance.start(
        {facingMode:'environment'},
        {fps:10, qrbox:{width:240, height:150}},
        onScanSuccess,
        ()=>{ /* per-frame decode miss, ignore */ }
      ).then(()=>{
        setScanHint('Point the camera at the barcode or QR code', false);
      }).catch(()=>{
        setScanHint('Camera access denied or unavailable. Type the code manually instead.', true);
      });
    }catch(e){
      setScanHint('Camera scanning is not supported on this device.', true);
    }
  }

  function onScanSuccess(decodedText){
    const targetId = scanTargetId;
    closeScanner();
    const field = el(targetId);
    if (!field) return;
    field.value = decodedText;
    field.dispatchEvent(new KeyboardEvent('keydown', {key:'Enter', keyCode:13, bubbles:true}));
  }

  function closeScanner(){
    el('scan-modal').classList.remove('show');
    if (html5QrcodeInstance){
      html5QrcodeInstance.stop().then(()=>{
        html5QrcodeInstance.clear();
        html5QrcodeInstance = null;
      }).catch(()=>{ html5QrcodeInstance = null; });
    }
  }

  el('scan-close').addEventListener('click', closeScanner);
  el('scan-modal').addEventListener('click', e=>{ if (e.target.id === 'scan-modal') closeScanner(); });
  el('btn-scan-from').addEventListener('click', ()=> openScanner('in-from', 'Scan: from location'));
  el('btn-scan-item').addEventListener('click', ()=> openScanner('in-item', 'Scan: item'));
  el('btn-scan-to').addEventListener('click', ()=> openScanner('in-to', 'Scan: to location'));

  // ---------- Init ----------
  loadStorage();
  loadLocHistory();
  loadOperatorName();
  el('operator-name').value = operatorName;
  el('operator-name').addEventListener('input', e => saveOperatorName(e.target.value));
  el('today-date').textContent = new Date().toLocaleDateString('en-GB', {year:'numeric', month:'2-digit', day:'2-digit'});
  renderLog();
  showStep(1);
</script>
</body>
</html>
